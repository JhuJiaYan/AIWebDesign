<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI機械自動化｜智慧設計・精準製造</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;800&display=swap" rel="stylesheet">

    <style>
        :root{
            --primary:#1F3A5F;
            --secondary:#2F80ED;
            --bg:#F5F7FA;
        }

        *{
            font-family:'Noto Sans TC',sans-serif;
        }

        body{
            background:#fff;
            padding-bottom:80px; /* 給底部導覽列空間 */
        }

        .navbar{
            background:#fff;
            box-shadow:0 4px 16px rgba(0,0,0,0.06);
        }

        .navbar-brand{
            font-weight:800;
            color:var(--primary)!important;
        }

        /* HERO */
        .hero{
            padding:110px 20px 50px;
        }

        .hero h1{
            font-size:2rem;
            font-weight:800;
            color:var(--primary);
        }

        .hero p{
            color:#666;
            margin-top:15px;
        }

        .btn-main{
            background:var(--secondary);
            color:#fff;
            padding:12px 22px;
            border-radius:10px;
            font-weight:700;
        }

        /* CARDS */
        .card-box{
            background:#fff;
            border:1px solid #edf2f7;
            border-radius:14px;
            padding:22px;
            box-shadow:0 6px 20px rgba(0,0,0,0.05);
        }

        .icon{
            font-size:2rem;
            color:var(--secondary);
        }

        footer{
            background:#152B46;
            color:#d6dce6;
            padding:30px 20px;
        }

        /* BOTTOM NAV (MOBILE NAVIGATION) */
        .bottom-nav{
            position:fixed;
            bottom:0;
            left:0;
            width:100%;
            background:#fff;
            box-shadow:0 -4px 18px rgba(0,0,0,0.08);
            z-index:999;
            display:flex;
            justify-content:space-around;
            align-items:center;
            padding:10px 0;
        }

        .bottom-nav a{
            text-decoration:none;
            color:#666;
            font-size:0.75rem;
            display:flex;
            flex-direction:column;
            align-items:center;
            gap:4px;
            font-weight:600;
        }

        .bottom-nav a i{
            font-size:1.3rem;
            color:var(--primary);
        }

        .bottom-nav a:hover{
            color:var(--secondary);
        }

        .bottom-nav a:hover i{
            color:var(--secondary);
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar fixed-top">
    <div class="container">
        <a class="navbar-brand" href="#">AI機械自動化</a>
    </div>
</nav>

<!-- HERO -->
<section class="hero">
    <div class="container text-center">

        <h1>AI驅動機械設計<br>打造智慧製造新時代</h1>

        <p>
            智慧設計・精準製造・加速未來<br>
            提升研發效率與生產競爭力。
        </p>

        <a href="#contact" class="btn btn-main mt-3">立即諮詢</a>

    </div>
</section>

<!-- FEATURES -->
<section class="py-5 bg-light">
    <div class="container">
        <div class="row g-4">

            <div class="col-12 col-md-6 col-lg-4">
                <div class="card-box">
                    <i class="bi bi-cpu icon"></i>
                    <h5 class="mt-3 fw-bold">AI設計整合</h5>
                    <p class="text-muted">工程設計與AI模型協作提升效率。</p>
                </div>
            </div>

            <div class="col-12 col-md-6 col-lg-4">
                <div class="card-box">
                    <i class="bi bi-gear icon"></i>
                    <h5 class="mt-3 fw-bold">機構自動化</h5>
                    <p class="text-muted">優化製造流程與設備穩定性。</p>
                </div>
            </div>

            <div class="col-12 col-md-6 col-lg-4">
                <div class="card-box">
                    <i class="bi bi-diagram-3 icon"></i>
                    <h5 class="mt-3 fw-bold">流程優化</h5>
                    <p class="text-muted">縮短產品開發週期。</p>
                </div>
            </div>

        </div>
    </div>
</section>

<!-- FOOTER -->
<footer id="contact">
    <div class="container text-center">
        <strong>AI機械自動化</strong>
        <div class="mt-2">智慧設計・精準製造・加速未來</div>
        <small class="d-block mt-2">© 2026 All Rights Reserved</small>
    </div>
</footer>

<!-- BOTTOM MOBILE NAVIGATION -->
<div class="bottom-nav">

    <a href="#top">
        <i class="bi bi-house"></i>
        首頁
    </a>

    <a href="#features">
        <i class="bi bi-lightning"></i>
        服務
    </a>

    <a href="#process">
        <i class="bi bi-diagram-3"></i>
        流程
    </a>

    <a href="#contact">
        <i class="bi bi-telephone"></i>
        聯絡
    </a>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
