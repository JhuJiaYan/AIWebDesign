<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI數位機械設計｜智慧購買平台</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>

:root{
    --primary:#1F3A5F;
    --secondary:#2F80ED;
    --accent:#FF8C42;
    --bg:#F5F7FA;
}

body{
    background:var(--bg);
    font-family:"Microsoft JhengHei",sans-serif;
}


/* Navbar */

.navbar{
    background:var(--primary);
}


/* Hero */

.hero-card{
    background:#fff;
    border-radius:25px;
    padding:45px;
    box-shadow:0 15px 40px rgba(0,0,0,.1);
}


.product-image{
    width:100%;
    max-width:420px;
    transition:.4s;
}

.product-image:hover{
    transform:scale(1.05);
}


.title{
    color:var(--primary);
    font-weight:800;
    font-size:42px;
}


.subtitle{
    color:var(--secondary);
    font-weight:bold;
}


.feature{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,.08);
    transition:.3s;
}

.feature:hover{
    transform:translateY(-8px);
}


.feature i{
    font-size:35px;
    color:var(--secondary);
}


.price{
    font-size:42px;
    color:#e53935;
    font-weight:800;
}


.old{
    text-decoration:line-through;
    color:#888;
}


.cta{
    background:#eef5ff;
    border-left:6px solid var(--accent);
    padding:20px;
    border-radius:10px;
}


.btn-buy{
    background:var(--accent);
    border:none;
    color:#fff;
    padding:15px 50px;
    font-size:20px;
    font-weight:bold;
    border-radius:12px;
}


.btn-buy:hover{
    background:#e66e20;
}


/* Modal */

.modal-header{
    background:var(--primary);
    color:white;
}


.product-modal{
    width:100%;
    max-height:300px;
    object-fit:contain;
}


.summary{
    background:#eef4ff;
    padding:15px;
    border-radius:10px;
}


.loading{
    display:none;
}


</style>

</head>


<body>


<nav class="navbar navbar-dark">

<div class="container">

<span class="navbar-brand fw-bold">

<i class="bi bi-cpu"></i>

AI數位機械設計

</span>

</div>

</nav>



<section class="py-5">

<div class="container">

<div class="hero-card">


<div class="row align-items-center g-5">


<div class="col-lg-5 text-center">


<img src="images/product1.png"
class="product-image"
alt="AI機械自動化設計鍵盤">


</div>



<div class="col-lg-7">


<h1 class="title">

AI機械自動化設計鍵盤

</h1>


<h3 class="subtitle">

讓設計流程更快、更精準、更智慧

</h3>


<p class="lead mt-4">

導入 AI數位機械設計，讓設計流程更快、更精準、更標準化。
降低重複作業與人為失誤，縮短開發時程、提升團隊效率，
協助企業加速智慧製造布局，創造更高競爭優勢。

</p>



<div class="row g-3 mt-3">


<div class="col-4">

<div class="feature text-center">

<i class="bi bi-lightning-charge"></i>

<h6 class="mt-2">
AI加速
</h6>

</div>

</div>


<div class="col-4">

<div class="feature text-center">

<i class="bi bi-bullseye"></i>

<h6 class="mt-2">
精準設計
</h6>

</div>

</div>


<div class="col-4">

<div class="feature text-center">

<i class="bi bi-graph-up"></i>

<h6 class="mt-2">
提升效率
</h6>

</div>

</div>


</div>



<div class="mt-4">

<span class="old">
原價 NT$6990
</span>


<div class="price">
NT$3990
</div>


</div>




<div class="cta mt-4">


<h4 class="fw-bold">

🚀 立即提升設計效率

</h4>


<p>

讓 AI 成為您的最佳設計助手，
加速創新、提升效率，
開啟智慧設計的新時代！

</p>


</div>



<button id="buyBtn"
class="btn btn-buy mt-4">

立即購買

</button>


</div>


</div>


</div>

</div>

</section>



<!-- Toast -->

<div class="toast-container position-fixed top-0 end-0 p-3">

<div id="toast"
class="toast text-bg-success">

<div class="toast-body">

已加入購物車 ✅

</div>

</div>

</div>




<!-- Purchase Modal -->

<div class="modal fade" id="buyModal">

<div class="modal-dialog modal-lg modal-dialog-centered">

<div class="modal-content">


<div class="modal-header">

<h5 class="modal-title">

立即購買

</h5>

<button class="btn-close btn-close-white"
data-bs-dismiss="modal">

</button>

</div>



<div class="modal-body">


<div class="row g-4">


<div class="col-md-5">


<img src="images/product1.png"
class="product-modal">


</div>



<div class="col-md-7">


<h3 class="text-primary fw-bold">

AI機械自動化設計鍵盤

</h3>


<h4 class="text-danger">

NT$3990

</h4>


<label class="form-label">

購買數量

</label>


<input id="qty"
type="number"
class="form-control"
value="1"
min="1"
max="10">


<div class="summary mt-3">


<div>

數量：

<span id="showQty">
1
</span>

</div>


<div>

小計：

<span id="total"
class="fw-bold text-danger">

NT$3990

</span>

</div>


</div>



<div class="loading text-center mt-3"
id="loading">


<div class="spinner-border text-primary">

</div>


<p>

處理中…

</p>


</div>



<button id="checkout"
class="btn btn-primary w-100 mt-3">

結帳

</button>



</div>


</div>


</div>



<div class="modal-footer">


<button class="btn btn-secondary"
data-bs-dismiss="modal">

關閉

</button>


</div>


</div>

</div>

</div>





<!-- Confirm Modal -->

<div class="modal fade" id="confirmModal">


<div class="modal-dialog modal-dialog-centered">


<div class="modal-content">


<div class="modal-header bg-success text-white">

<h5 class="modal-title">

確認購買資訊

</h5>

<button class="btn-close btn-close-white"
data-bs-dismiss="modal">

</button>


</div>


<div class="modal-body"
id="confirmText">


</div>


</div>


</div>


</div>




<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>


<script>


const price=3990;


const buyModal=
new bootstrap.Modal(
document.getElementById("buyModal")
);


const confirmModal=
new bootstrap.Modal(
document.getElementById("confirmModal")
);



const toast=
new bootstrap.Toast(
document.getElementById("toast"),
{
delay:2500
}
);



buyBtn.onclick=function(){

buyModal.show();

toast.show();

};



function update(){

let qtyValue=parseInt(qty.value);


if(qtyValue<1) qtyValue=1;

if(qtyValue>10) qtyValue=10;


qty.value=qtyValue;


showQty.innerHTML=qtyValue;


total.innerHTML=
"NT$"+
(qtyValue*price).toLocaleString();


}


qty.oninput=update;



checkout.onclick=function(){


let q=parseInt(qty.value);

let sum=q*price;


console.log(
"數量:",
q
);


console.log(
"單價:",
price
);


console.log(
"小計:",
sum
);



loading.style.display="block";


checkout.disabled=true;



setTimeout(()=>{


loading.style.display="none";


checkout.disabled=false;



confirmText.innerHTML=`

<table class="table">

<tr>

<th>
產品名稱
</th>

<td>
AI機械自動化設計鍵盤
</td>

</tr>


<tr>

<th>
數量
</th>

<td>
${q}
</td>

</tr>


<tr>

<th>
單價
</th>

<td>
NT$${price.toLocaleString()}
</td>

</tr>


<tr>

<th>
總金額
</th>

<td class="text-danger fw-bold">

NT$${sum.toLocaleString()}

</td>

</tr>


</table>

`;



confirmModal.show();



},1000);


};



</script>


</body>

</html>
