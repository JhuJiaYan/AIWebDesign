<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公司官方網站｜Swiper 圖片輪播</title>

    <!-- Swiper CSS -->
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
    />

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:"Microsoft JhengHei",sans-serif;
            background:#f4f6f9;
            color:#333;
        }

        /* ===========================
           Hero Swiper
           高度：畫面上方三分之一
        =========================== */
        .hero-swiper{
            width:100%;
            height:33.33vh;
            background:#111;
        }

        .swiper-slide{
            display:flex;
            justify-content:center;
            align-items:center;
            overflow:hidden;
            background:#000;
        }

        .swiper-slide img{
            width:100%;
            height:100%;
            object-fit:cover;
            object-position:center;
            display:block;
        }

        /* 導覽按鈕 */
        .swiper-button-next,
        .swiper-button-prev{
            color:#ffffff;
        }

        /* 分頁器 */
        .swiper-pagination-bullet{
            background:#ffffff;
            opacity:.7;
        }

        .swiper-pagination-bullet-active{
            background:#0d6efd;
            opacity:1;
        }

        /* 範例內容 */
        .content{
            max-width:1200px;
            margin:auto;
            padding:60px 25px;
            line-height:1.8;
        }

        h1{
            margin-bottom:20px;
            color:#1f2937;
        }

        p{
            color:#555;
        }

    </style>
</head>

<body>

    <!-- ===========================
         Hero Swiper
    ============================ -->
    <div class="swiper hero-swiper">

        <div class="swiper-wrapper">

            <div class="swiper-slide">
                <img src="https://picsum.photos/1920/1080?random=1" alt="Slide 1">
            </div>

            <div class="swiper-slide">
                <img src="https://picsum.photos/1920/1080?random=2" alt="Slide 2">
            </div>

            <div class="swiper-slide">
                <img src="https://picsum.photos/1920/1080?random=3" alt="Slide 3">
            </div>

            <div class="swiper-slide">
                <img src="https://picsum.photos/1920/1080?random=4" alt="Slide 4">
            </div>

            <div class="swiper-slide">
                <img src="https://picsum.photos/1920/1080?random=5" alt="Slide 5">
            </div>

        </div>

        <!-- Pagination -->
        <div class="swiper-pagination"></div>

        <!-- Navigation -->
        <div class="swiper-button-prev"></div>
        <div class="swiper-button-next"></div>

    </div>

    <!-- 公司內容範例 -->
    <main class="content">

        <h1>公司名稱</h1>

        <p>
            此區域為公司網站內容，可放置品牌介紹、服務項目、
            最新消息、產品資訊或企業形象等內容。
            上方採用 Swiper.js 製作響應式圖片輪播，
            支援滑鼠拖曳、觸控滑動、分頁器與左右導覽按鈕，
            適合企業形象首頁使用。
        </p>

    </main>

    <!-- Swiper JS -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        const swiper = new Swiper(".hero-swiper", {
            slidesPerView: 3,      // 一次顯示三張
            spaceBetween: 20,      // 圖片間距

            loop: true,

            speed: 800,

            autoplay: {
                delay: 3500,
                disableOnInteraction: false,
            },

            pagination: {
                el: ".swiper-pagination",
                clickable: true,
            },

            navigation: {
                nextEl: ".swiper-button-next",
                prevEl: ".swiper-button-prev",
            },

            keyboard: {
                enabled: true,
            },

            mousewheel: false,

            effect: "slide",

            grabCursor: true,

        });
    </script>

</body>
</html>
