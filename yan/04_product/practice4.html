<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>公司作品集｜PhotoSwipe Gallery</title>

<!-- PhotoSwipe CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/photoswipe@5.4.4/dist/photoswipe.css">

<style>
body{
    margin:0;
    font-family:"Microsoft JhengHei",sans-serif;
    background:#0f172a;
    color:#fff;
}

/* Header */
header{
    text-align:center;
    padding:60px 20px 30px;
}

header h1{
    font-size:32px;
    margin-bottom:10px;
}

header p{
    color:#cbd5e1;
}

/* Gallery Grid */
.gallery{
    max-width:1100px;
    margin:0 auto 80px;
    padding:20px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
}

.gallery figure{
    margin:0;
    overflow:hidden;
    border-radius:12px;
    cursor:pointer;
    box-shadow:0 10px 25px rgba(0,0,0,.3);
    transition:.3s;
}

.gallery figure:hover{
    transform:translateY(-5px);
}

.gallery img{
    width:100%;
    height:200px;
    object-fit:cover;
    display:block;
}
</style>
</head>

<body>

<header>
    <h1>YAN 科技公司作品集</h1>
    <p>PhotoSwipe 5｜專業影像展示系統</p>
</header>

<!-- ================= Gallery ================= -->
<div class="gallery">

    <figure>
        <a href="https://picsum.photos/1200/900?random=1"
           data-pswp-width="1200"
           data-pswp-height="900"
           target="_blank">
            <img src="https://picsum.photos/400/300?random=1" alt="">
        </a>
    </figure>

    <figure>
        <a href="https://picsum.photos/1200/900?random=2"
           data-pswp-width="1200"
           data-pswp-height="900"
           target="_blank">
            <img src="https://picsum.photos/400/300?random=2" alt="">
        </a>
    </figure>

    <figure>
        <a href="https://picsum.photos/1200/900?random=3"
           data-pswp-width="1200"
           data-pswp-height="900"
           target="_blank">
            <img src="https://picsum.photos/400/300?random=3" alt="">
        </a>
    </figure>

    <figure>
        <a href="https://picsum.photos/1200/900?random=4"
           data-pswp-width="1200"
           data-pswp-height="900"
           target="_blank">
            <img src="https://picsum.photos/400/300?random=4" alt="">
        </a>
    </figure>

    <figure>
        <a href="https://picsum.photos/1200/900?random=5"
           data-pswp-width="1200"
           data-pswp-height="900"
           target="_blank">
            <img src="https://picsum.photos/400/300?random=5" alt="">
        </a>
    </figure>

</div>

<!-- ================= PhotoSwipe Root ================= -->
<div class="pswp-gallery" id="my-gallery"></div>

<!-- PhotoSwipe JS -->
<script type="module">
import PhotoSwipeLightbox from 'https://cdn.jsdelivr.net/npm/photoswipe@5.4.4/dist/photoswipe-lightbox.esm.min.js';

const lightbox = new PhotoSwipeLightbox({
    gallery: '.gallery',
    children: 'a',
    pswpModule: () => import('https://cdn.jsdelivr.net/npm/photoswipe@5.4.4/dist/photoswipe.esm.min.js')
});

lightbox.init();
</script>

</body>
</html>
