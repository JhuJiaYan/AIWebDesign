<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>AI機械自動化設計鍵盤｜產品主視覺</title>

<!-- Bootstrap 5 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Fancybox -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fancyapps/ui@5.0/dist/fancybox/fancybox.css">

<style>
body{
    background:#F5F7FA;
    font-family:"Microsoft JhengHei",sans-serif;
    color:#1f2937;
}

/* HERO */
.hero{
    background:#0f172a;
    color:#fff;
    padding:80px 20px;
    text-align:center;
}

.hero h1{
    font-weight:800;
}

.hero p{
    max-width:900px;
    margin:15px auto 0;
    color:#cbd5e1;
    line-height:1.7;
}

/* SECTION */
.box{
    background:#fff;
    padding:30px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.05);
    margin-top:30px;
}

/* SECTION TITLE */
.section-title{
    font-weight:700;
    border-left:5px solid #2563eb;
    padding-left:12px;
    margin-bottom:20px;
}

/* MAIN GALLERY */
.gallery a{
    display:block;
}

.gallery img{
    width:100%;
    border-radius:12px;
    transition:.3s;
    cursor:pointer;
}

.gallery img:hover{
    transform:scale(1.02);
}

/* CTA */
.cta{
    background:#0f172a;
    color:#fff;
    padding:40px;
    border-radius:12px;
    text-align:center;
    margin-top:30px;
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
    <h1>AI機械自動化設計鍵盤</h1>
    <p>
        將 AI 技術導入機械設計流程，提升效率、降低錯誤、加速產品開發。
    </p>
</section>

<div class="container py-5">

<!-- INTRO -->
<div class="box">
    <h2 class="section-title">產品介紹</h2>

    <p>
        在智慧製造與工業數位轉型快速發展的時代，
        傳統機械設計流程需要大量重複操作與人工檢查，
        AI 技術可有效提升效率與精準度。
    </p>
</div>

<!-- FANCYBOX GALLERY (ONLY) -->
<div class="box">
    <h2 class="section-title">產品主視覺（點擊放大）</h2>

    <div class="row g-3 gallery">

        <div class="col-12">
            <a data-fancybox="gallery" href="images/product1.png">
                <img src="images/product1.png" alt="">
            </a>
        </div>

        <div class="col-6 col-md-3">
            <a data-fancybox="gallery" href="images/product2.png">
                <img src="images/product2.png" alt="">
            </a>
        </div>

        <div class="col-6 col-md-3">
            <a data-fancybox="gallery" href="images/scene1.png">
                <img src="images/scene1.png" alt="">
            </a>
        </div>

        <div class="col-6 col-md-3">
            <a data-fancybox="gallery" href="images/scene2.png">
                <img src="images/scene2.png" alt="">
            </a>
        </div>

        <div class="col-6 col-md-3">
            <a data-fancybox="gallery" href="images/scene3.png">
                <img src="images/scene3.png" alt="">
            </a>
        </div>

    </div>
</div>

<!-- FEATURES -->
<div class="box">
    <h2 class="section-title">三大核心優勢</h2>

    <p>● AI智慧流程加速：自動化設計流程，減少人工操作。</p>
    <p>● 提升設計精準度：降低錯誤率，提高一致性。</p>
    <p>● 節省成本與時間：縮短開發週期。</p>
</div>

<!-- CTA -->
<div class="cta">
    <h3>立即了解 AI 機械自動化設計鍵盤</h3>
    <p>加速創新、提升效率、打造智慧工程流程</p>
    <button class="btn btn-primary btn-lg">立即諮詢</button>
</div>

</div>

<!-- Fancybox -->
<script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui@5.0/dist/fancybox/fancybox.umd.js"></script>

<script>
Fancybox.bind("[data-fancybox='gallery']", {
    Thumbs: { type: "classic" },
    Toolbar: ["zoom", "close"],
    animated: true,
    dragToClose: true
});
</script>

</body>
</html>
