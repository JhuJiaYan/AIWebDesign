<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公司官方網站｜Bootstrap 5 全螢幕輪播</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        html,
        body {
            height: 100%;
            margin: 0;
            background: #111827;
            font-family: "Microsoft JhengHei", sans-serif;
        }

        /* 全螢幕 Carousel */
        .carousel,
        .carousel-inner,
        .carousel-item {
            height: 100vh;
        }

        /* 圖片填滿畫面 */
        .carousel-item img {
            width: 100%;
            height: 100vh;
            object-fit: cover;
            object-position: center;
        }

        /* 深色遮罩，提高文字可讀性 */
        .carousel-item::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,.45);
            z-index: 1;
        }

        /* Caption */
        .carousel-caption {
            z-index: 2;
            bottom: 18%;
        }

        .carousel-caption h1 {
            font-size: clamp(2rem,5vw,4.5rem);
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-shadow: 0 4px 15px rgba(0,0,0,.5);
        }

        .carousel-caption p {
            font-size: 1.2rem;
            max-width: 750px;
            margin: auto;
            line-height: 1.8;
            text-shadow: 0 3px 10px rgba(0,0,0,.5);
        }

        .carousel-caption .btn {
            margin-top: 30px;
            padding: 12px 35px;
            font-weight: 600;
        }

        /* 導覽箭頭 */
        .carousel-control-prev-icon,
        .carousel-control-next-icon{
            width:3rem;
            height:3rem;
        }

        /* 指示器 */
        .carousel-indicators [data-bs-target]{
            width:12px;
            height:12px;
            border-radius:50%;
            margin:0 6px;
        }
    </style>
</head>

<body>

<!-- ===================================================== -->
<!-- Full Screen Carousel -->
<!-- ===================================================== -->

<div id="companyCarousel"
     class="carousel slide carousel-fade"
     data-bs-ride="carousel"
     data-bs-interval="5000">

    <!-- Indicators -->
    <div class="carousel-indicators">

        <button type="button"
                data-bs-target="#companyCarousel"
                data-bs-slide-to="0"
                class="active"></button>

        <button type="button"
                data-bs-target="#companyCarousel"
                data-bs-slide-to="1"></button>

        <button type="button"
                data-bs-target="#companyCarousel"
                data-bs-slide-to="2"></button>

        <button type="button"
                data-bs-target="#companyCarousel"
                data-bs-slide-to="3"></button>

        <button type="button"
                data-bs-target="#companyCarousel"
                data-bs-slide-to="4"></button>

    </div>

    <!-- Carousel Inner -->
    <div class="carousel-inner">

        <!-- Slide 1 -->
        <div class="carousel-item active">

            <img src="https://picsum.photos/1920/1080?random=1"
                 class="d-block w-100"
                 alt="Slide 1">

            <div class="carousel-caption text-center">
                <h1>公司品牌形象</h1>
                <p>
                    Placeholder Text｜建立值得信賴的企業品牌形象，
                    提供專業且高品質的產品與服務。
                </p>

                <button class="btn btn-warning btn-lg">
                    了解更多
                </button>
            </div>

        </div>

        <!-- Slide 2 -->
        <div class="carousel-item">

            <img src="https://picsum.photos/1920/1080?random=2"
                 class="d-block w-100"
                 alt="Slide 2">

            <div class="carousel-caption">
                <h1>創新技術</h1>
                <p>
                    Placeholder Text｜持續投入創新研發，
                    打造高效率與智慧化解決方案。
                </p>

                <button class="btn btn-outline-light btn-lg">
                    查看服務
                </button>
            </div>

        </div>

        <!-- Slide 3 -->
        <div class="carousel-item">

            <img src="https://picsum.photos/1920/1080?random=3"
                 class="d-block w-100"
                 alt="Slide 3">

            <div class="carousel-caption">
                <h1>專業團隊</h1>
                <p>
                    Placeholder Text｜結合專業人才與豐富經驗，
                    提供最佳商業價值與技術支援。
                </p>

                <button class="btn btn-primary btn-lg">
                    團隊介紹
                </button>
            </div>

        </div>

        <!-- Slide 4 -->
        <div class="carousel-item">

            <img src="https://picsum.photos/1920/1080?random=4"
                 class="d-block w-100"
                 alt="Slide 4">

            <div class="carousel-caption">
                <h1>智慧未來</h1>
                <p>
                    Placeholder Text｜運用數位科技與智慧自動化，
                    協助企業邁向新世代。
                </p>

                <button class="btn btn-success btn-lg">
                    解決方案
                </button>
            </div>

        </div>

        <!-- Slide 5 -->
        <div class="carousel-item">

            <img src="https://picsum.photos/1920/1080?random=5"
                 class="d-block w-100"
                 alt="Slide 5">

            <div class="carousel-caption">
                <h1>攜手合作</h1>
                <p>
                    Placeholder Text｜與您共同打造永續發展、
                    創造企業競爭優勢。
                </p>

                <button class="btn btn-danger btn-lg">
                    聯絡我們
                </button>
            </div>

        </div>

    </div>

    <!-- Controls -->

    <button class="carousel-control-prev"
            type="button"
            data-bs-target="#companyCarousel"
            data-bs-slide="prev">

        <span class="carousel-control-prev-icon"></span>

        <span class="visually-hidden">
            Previous
        </span>

    </button>

    <button class="carousel-control-next"
            type="button"
            data-bs-target="#companyCarousel"
            data-bs-slide="next">

        <span class="carousel-control-next-icon"></span>

        <span class="visually-hidden">
            Next
        </span>

    </button>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
