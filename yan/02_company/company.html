<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI機械自動化 | 品牌介紹</title>

<style>
/* Bootstrap 5.3.7 (Minimal Required Utilities for Single File Demo) */
:root{
    --bs-primary:#0d6efd;
    --bs-dark:#1f2937;
    --bs-secondary:#6c757d;
    --bs-light:#f8f9fa;
    --bs-white:#ffffff;
    --bs-border:#dee2e6;
    --bs-body:#eef2f6;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;
    background:var(--bs-body);
    color:#212529;
    line-height:1.8;
}

/* Bootstrap Utilities */

.container{
    width:100%;
    max-width:1140px;
    margin:auto;
    padding:0 15px;
}

.row{
    display:flex;
    flex-wrap:wrap;
    margin-left:-12px;
    margin-right:-12px;
}

.col-12{
    width:100%;
    padding:12px;
}

@media(min-width:768px){
.col-md-6{
    width:50%;
}
}

@media(min-width:992px){
.col-lg-4{
    width:33.3333%;
}
}

.py-5{
    padding-top:4rem;
    padding-bottom:4rem;
}

.mb-3{margin-bottom:1rem;}
.mb-4{margin-bottom:1.5rem;}
.mb-5{margin-bottom:3rem;}
.text-center{text-align:center;}
.text-white{color:#fff;}
.text-secondary{color:#6c757d;}
.d-flex{display:flex;}
.flex-column{flex-direction:column;}
.justify-content-center{justify-content:center;}
.align-items-center{align-items:center;}

.btn{
    display:inline-block;
    padding:.85rem 2rem;
    border:none;
    border-radius:8px;
    text-decoration:none;
    cursor:pointer;
    transition:.3s;
    font-weight:600;
}

.btn-primary{
    background:var(--bs-primary);
    color:white;
}

.btn-primary:hover{
    background:#0b5ed7;
}

/* Hero */

.hero{
    background:linear-gradient(135deg,#162235,#273d63);
    color:white;
    padding:90px 20px;
}

.logo{
    width:110px;
    height:110px;
    border:2px dashed rgba(255,255,255,.35);
    border-radius:16px;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-bottom:25px;
    overflow:hidden;
    background:rgba(255,255,255,.05);
}

/* 未來請放入 logo.png */
.logo img{
    width:100%;
    height:100%;
    object-fit:contain;
    
}

.logo span{
    font-size:13px;
    opacity:.7;
}

.hero h1{
    font-size:3rem;
    margin-bottom:15px;
}

.hero h2{
    font-size:1.35rem;
    font-weight:400;
    color:#d7e4ff;
}

/* Cards */

.card{
    background:white;
    border-radius:16px;
    padding:35px;
    height:100%;
    box-shadow:0 12px 28px rgba(0,0,0,.08);
    transition:.3s;
}

.card:hover{
    transform:translateY(-6px);
    box-shadow:0 20px 40px rgba(0,0,0,.12);
}

.card h3{
    color:#183153;
    margin-bottom:18px;
}

/* CTA */

.cta{
    background:#183153;
    color:white;
    border-radius:18px;
    padding:60px 30px;
}
</style>
</head>

<body>

<section class="hero">
    <div class="container d-flex flex-column align-items-center text-center">

        <div class="logo" >
            <!-- 未來請取消 display:none -->
          
            <img src="imagess/logo.png" alt="AI機械自動化 Logo">
            
            <!--span>LOGO</span-->
        </div>

        <h1>AI機械自動化</h1>

        <h2>
            智慧設計・精準製造・加速未來
        </h2>

    </div>
</section>

<section class="py-5">

    <div class="container">

        <div class="row">

            <div class="col-12 col-md-6 col-lg-4">

                <div class="card">

                    <h3>品牌願景</h3>

                    <p>
                        以 AI 驅動數位機械設計與智慧自動化，
                        協助企業縮短開發週期、提升設計品質，
                        打造高效率、低成本的智慧製造新模式。
                    </p>

                </div>

            </div>

            <div class="col-12 col-md-6 col-lg-4">

                <div class="card">

                    <h3>品牌理念</h3>

                    <p>
                        專注於 AI 數位機械設計，
                        整合人工智慧、3D 建模、
                        工程分析與自動化技術，
                        建立快速、精準且可量產的設計流程。
                    </p>

                </div>

            </div>

            <div class="col-12 col-md-6 col-lg-4">

                <div class="card">

                    <h3>核心價值</h3>

                    <p>
                        降低設計門檻、
                        提升研發效率、
                        優化製造流程，
                        協助企業完成數位轉型，
                        成為智慧製造的最佳合作夥伴。
                    </p>

                </div>

            </div>

        </div>

    </div>

</section>

<section class="py-5">

    <div class="container">

        <div class="cta text-center">

            <h2 class="mb-3">
                AI 驅動智慧製造
            </h2>

            <p class="mb-4">
                我們以 AI 技術結合機械設計與自動化流程，
                提供企業更快速、更精準、更具競爭力的數位設計解決方案。
            </p>

            <button class="btn btn-primary" id="contactBtn">
                聯絡我們
            </button>

        </div>

    </div>

</section>

<script>
document.getElementById("contactBtn").addEventListener("click",function(){
    alert("感謝您的關注，歡迎與 AI機械自動化 聯絡。");
});
</script>

</body>
</html>
