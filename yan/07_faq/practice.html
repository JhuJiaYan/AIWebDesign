<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI數位機械設計｜顧客諮詢表單</title>

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f7fa;
            font-family: "Microsoft JhengHei", Arial, sans-serif;
        }

        .contact-section {
            max-width: 900px;
            margin: 50px auto;
        }

        .form-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 35px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
        }

        .brand-title {
            color: #0d6efd;
            font-weight: 700;
        }

        .form-label {
            font-weight: 600;
        }

        .required {
            color: red;
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            font-size: 18px;
            font-weight: bold;
        }

        .section-title {
            border-left: 5px solid #0d6efd;
            padding-left: 12px;
            margin-bottom: 25px;
        }
    </style>
</head>

<body>

<section class="container contact-section">

    <div class="form-card">

        <h2 class="text-center brand-title mb-3">
            AI數位機械設計
        </h2>

        <h4 class="section-title">
            立即諮詢 AI智慧設計解決方案
        </h4>

        <p class="text-muted mb-4">
            想了解 AI機械自動化設計鍵盤如何提升設計效率？
            請留下您的需求，我們將提供專業產品說明與導入建議，
            協助企業加速智慧製造與數位轉型。
        </p>

        <!-- 錯誤提示 -->
        <div id="errorAlert" class="alert alert-danger d-none"></div>


        <form id="contactForm">

            <!-- 姓名 -->
            <div class="mb-3">
                <label class="form-label">
                    姓名 <span class="required">*</span>
                </label>
                <input type="text" class="form-control" id="name" required>
            </div>


            <!-- Email -->
            <div class="mb-3">
                <label class="form-label">
                    Email <span class="required">*</span>
                </label>
                <input type="email" class="form-control" id="email" required>
            </div>


            <!-- 電話 -->
            <div class="mb-3">
                <label class="form-label">
                    電話
                </label>
                <input type="tel" class="form-control" id="phone">
            </div>


            <!-- 諮詢類型 -->
            <div class="mb-3">
                <label class="form-label">
                    諮詢類型
                </label>

                <select class="form-select" id="consultType">
                    <option value="產品問題">產品問題</option>
                    <option value="價格方案">價格方案</option>
                    <option value="合作提案">合作提案</option>
                    <option value="售後服務">售後服務</option>
                </select>
            </div>


            <!-- 聯絡方式 -->
            <div class="mb-3">

                <label class="form-label">
                    希望聯絡方式
                </label>

                <div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input"
                               type="radio"
                               name="contactMethod"
                               value="Email"
                               checked>
                        <label class="form-check-label">
                            Email
                        </label>
                    </div>

                    <div class="form-check form-check-inline">
                        <input class="form-check-input"
                               type="radio"
                               name="contactMethod"
                               value="電話">
                        <label class="form-check-label">
                            電話
                        </label>
                    </div>

                    <div class="form-check form-check-inline">
                        <input class="form-check-input"
                               type="radio"
                               name="contactMethod"
                               value="Line">
                        <label class="form-check-label">
                            Line
                        </label>
                    </div>
                </div>

            </div>


            <!-- 想了解項目 -->
            <div class="mb-3">

                <label class="form-label">
                    想了解項目
                </label>

                <div class="row">

                    <div class="col-md-6">
                        <div class="form-check">
                            <input class="form-check-input"
                                   type="checkbox"
                                   name="interest"
                                   value="功能細節">
                            <label class="form-check-label">
                                功能細節
                            </label>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="form-check">
                            <input class="form-check-input"
                                   type="checkbox"
                                   name="interest"
                                   value="試用">
                            <label class="form-check-label">
                                試用
                            </label>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="form-check">
                            <input class="form-check-input"
                                   type="checkbox"
                                   name="interest"
                                   value="報價">
                            <label class="form-check-label">
                                報價
                            </label>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="form-check">
                            <input class="form-check-input"
                                   type="checkbox"
                                   name="interest"
                                   value="交期">
                            <label class="form-check-label">
                                交期
                            </label>
                        </div>
                    </div>

                </div>

            </div>


            <!-- 問題描述 -->
            <div class="mb-3">

                <label class="form-label">
                    問題描述 <span class="required">*</span>
                </label>

                <textarea class="form-control"
                          id="description"
                          rows="5"
                          required
                          placeholder="請詳細描述您的需求，例如目前使用的設計流程、遇到的問題，以及希望改善的方向，方便我們提供更精準的建議。"></textarea>

            </div>


            <!-- 附件 -->
            <div class="mb-3">

                <label class="form-label">
                    附件上傳
                </label>

                <input type="file"
                       class="form-control"
                       id="attachment">

            </div>


            <!-- 同意條款 -->
            <div class="mb-4">

                <div class="form-check">

                    <input class="form-check-input"
                           type="checkbox"
                           id="agree">

                    <label class="form-check-label">
                        我同意提供以上資料供 AI數位機械設計 進行聯絡與服務處理。
                        <span class="required">*</span>
                    </label>

                </div>

            </div>


            <button type="submit"
                    class="btn btn-primary btn-submit">
                提交需求，開啟智慧設計升級
            </button>


        </form>

    </div>

</section>



<!-- Bootstrap Toast -->
<div class="position-fixed bottom-0 end-0 p-3">

    <div id="successToast"
         class="toast"
         role="alert">

        <div class="toast-header">
            <strong class="me-auto">
                AI數位機械設計
            </strong>

            <button type="button"
                    class="btn-close"
                    data-bs-dismiss="toast">
            </button>

        </div>

        <div class="toast-body">
            送出成功，我們將盡快與您聯繫！
        </div>

    </div>

</div>



<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>


<script>

const form = document.getElementById("contactForm");
const errorAlert = document.getElementById("errorAlert");


form.addEventListener("submit", function(event){

    event.preventDefault();


    errorAlert.classList.add("d-none");


    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const description = document.getElementById("description").value.trim();
    const agree = document.getElementById("agree").checked;


    if(name === "" || email === "" || description === ""){

        errorAlert.innerHTML =
        "請確認姓名、Email及問題描述皆已填寫。";

        errorAlert.classList.remove("d-none");

        return;
    }


    if(!agree){

        errorAlert.innerHTML =
        "請先勾選同意條款後再送出表單。";

        errorAlert.classList.remove("d-none");

        return;
    }



    const contactMethod =
    document.querySelector(
        'input[name="contactMethod"]:checked'
    ).value;



    const interests =
    Array.from(
        document.querySelectorAll(
            'input[name="interest"]:checked'
        )
    ).map(item => item.value);



    const data = {

        姓名: name,

        Email: email,

        電話:
        document.getElementById("phone").value,

        諮詢類型:
        document.getElementById("consultType").value,

        希望聯絡方式:
        contactMethod,

        想了解項目:
        interests,

        問題描述:
        description,

        附件:
        document.getElementById("attachment").files[0]
        ? document.getElementById("attachment").files[0].name
        : "無",

        同意條款:
        agree

    };


    console.log("顧客諮詢資料：", data);



    const toast =
    new bootstrap.Toast(
        document.getElementById("successToast")
    );


    toast.show();


    form.reset();


});

</script>


</body>
</html>
