<!DOCTYPE html>
<html lang="zh-Hant">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI數位機械設計｜網站整合平台</title>


<!-- Bootstrap 5 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">


<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet">


<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;800&display=swap" rel="stylesheet">



<style>

:root{

    --primary:#1F3A5F;
    --secondary:#2F80ED;
    --accent:#FF8C42;
    --bg:#F5F7FA;

}


*{

    font-family:'Noto Sans TC',sans-serif;

}



body{

    margin:0;
    background:var(--bg);

}



/* Navbar */

.navbar{

    background:white;
    box-shadow:0 3px 15px rgba(0,0,0,0.08);

}


.navbar-brand{

    color:var(--primary);
    font-weight:800;
    font-size:22px;

}


.nav-link{

    color:var(--primary)!important;
    font-weight:600;
    cursor:pointer;
    transition:.3s;

}


.nav-link:hover{

    color:var(--secondary)!important;

}



/* iframe區域 */

.main-frame{


    width:100%;
    height:calc(100vh - 130px);
    border:none;
    background:white;


}



/* Footer */


footer{


    background:white;
    border-top:1px solid #ddd;
    height:60px;


}



.footer-link{

    color:var(--primary);
    text-decoration:none;
    font-weight:700;

}


.footer-link:hover{

    color:var(--accent);

}



</style>


</head>



<body>



<!-- Navbar -->

<nav class="navbar navbar-expand-lg fixed-top">


<div class="container">


<a class="navbar-brand" href="#"
onclick="loadPage('02_company/company.html')">

<i class="bi bi-cpu"></i>

AI數位機械設計

</a>



<button class="navbar-toggler"
data-bs-toggle="collapse"
data-bs-target="#menu">


<span class="navbar-toggler-icon"></span>


</button>



<div class="collapse navbar-collapse"
id="menu">


<ul class="navbar-nav ms-auto">



<li class="nav-item">

<a class="nav-link"
onclick="loadPage('02_company/company.html')">

首頁

</a>

</li>




<li class="nav-item">

<a class="nav-link"
onclick="loadPage('04_product/product.html')">

產品

</a>

</li>




<li class="nav-item">

<a class="nav-link"
onclick="loadPage('05_table/table.html')">

功能

</a>

</li>




<li class="nav-item">

<a class="nav-link"
onclick="loadPage('06_shopping/shopping.html')">

訂購

</a>

</li>




<li class="nav-item">

<a class="nav-link"
onclick="loadPage('07_faq/faq.html')">

問與答

</a>

</li>



</ul>


</div>


</div>


</nav>





<!-- iframe主要內容區 -->


<main style="padding-top:70px;">


<iframe

id="contentFrame"

class="main-frame"

src="02_company/company.html">


</iframe>


</main>






<!-- Footer -->


<footer class="d-flex justify-content-end align-items-center px-4">


<a class="footer-link"

onclick="loadPage('01_me/me.html')">


<i class="bi bi-person-circle"></i>

關於我（01_me）

</a>


</footer>





<script>


function loadPage(url){


    document
    .getElementById("contentFrame")
    .src = url;


}



</script>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>


</body>


</html>
