<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>B2B 工業科技網站模板</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;800&display=swap" rel="stylesheet">

    <style>
        :root{
            --primary:#1F3A5F;
            --secondary:#2F80ED;
            --accent:#FF8C42;
            --bg:#F5F7FA;
        }

        *{
            font-family:'Noto Sans TC',sans-serif;
        }

        body{
            background:#fff;
        }

        .navbar-brand img{
            height:32px;
        }

        .page-section{
            display:none;
            min-height:70vh;
            padding:100px 20px 80px;
        }

        .page-section.active{
            display:block;
        }

        footer{
            position:fixed;
            bottom:0;
            left:0;
            width:100%;
            background:#fff;
            border-top:1px solid #eee;
            padding:10px 20px;
        }

        .footer-link{
            color:var(--primary);
            font-weight:700;
            text-decoration:none;
            cursor:pointer;
        }

        .nav-link{
            cursor:pointer;
            font-weight:600;
        }
    </style>
</head>

<body class="bg-light">

<!-- 導覽列 -->
<nav class="navbar navbar-expand-lg bg-white shadow-sm fixed-top">
    <div class="container">

        <!-- LOGO -->
        <a class="navbar-brand d-flex align-items-center gap-2" href="#" onclick="showPage('首頁')">
            <img src="images/logo.png" alt="logo">
        </a>

        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#導覽列">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="導覽列">
            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link text-primary" onclick="showPage('產品')">產品</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-primary" onclick="showPage('規格')">規格</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-primary" onclick="showPage('購買')">購買</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-primary" onclick="showPage('問與答')">問與答</a>
                </li>

            </ul>
        </div>

    </div>
</nav>

<!-- 首頁 -->
<section id="首頁" class="page-section active bg-light">
    <div class="container">
        <div class="text-center">
            <h1 class="text-primary fw-bold">首頁</h1>
            <p>首頁內容區（保留）</p>
        </div>
    </div>
</section>

<!-- 產品 -->
<section id="產品" class="page-section bg-white">
    <div class="container">
        <h1 class="text-primary fw-bold">產品</h1>
        <p>產品內容區（保留）</p>
    </div>
</section>

<!-- 規格 -->
<section id="規格" class="page-section bg-light">
    <div class="container">
        <h1 class="text-primary fw-bold">規格</h1>
        <p>規格內容區（保留）</p>
    </div>
</section>

<!-- 購買 -->
<section id="購買" class="page-section bg-white">
    <div class="container">
        <h1 class="text-primary fw-bold">購買</h1>
        <p>購買內容區（保留）</p>
    </div>
</section>

<!-- 問與答 -->
<section id="問與答" class="page-section bg-light">
    <div class="container">
        <h1 class="text-primary fw-bold">問與答</h1>
        <p>問與答內容區（保留）</p>
    </div>
</section>

<!-- 關於我 -->
<section id="關於我" class="page-section bg-white">
    <div class="container">
        <h1 class="text-primary fw-bold">關於我</h1>
        <p>關於我內容區（保留）</p>
    </div>
</section>

<!-- 頁尾 -->
<footer class="d-flex justify-content-end align-items-center">
    <a class="footer-link" onclick="showPage('關於我')">關於我 me</a>
</footer>

<!-- JS -->
<script>
function showPage(pageId){

    const sections = document.querySelectorAll('.page-section');

    sections.forEach(sec => {
        sec.classList.remove('active');
    });

    const target = document.getElementById(pageId);
    if(target){
        target.classList.add('active');
    }
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
