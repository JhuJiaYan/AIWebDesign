<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>公司｜原生 HTML/CSS 卡片展示</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;
    background:#f5f6f8;
    color:#222;
}

header{
    background:linear-gradient(135deg,#0f172a,#1e3a8a);
    color:#fff;
    text-align:center;
    padding:90px 40px;
}

header h1{
    font-size:46px;
    margin-bottom:20px;
    letter-spacing:3px;
}

header p{
    width:700px;
    margin:0 auto;
    line-height:1.8;
    color:rgba(255,255,255,.85);
}

.container{
    width:1200px;
    margin:80px auto;
}

.cards{
    display:flex;
    gap:40px;
    justify-content:space-between;
}

.card{
    width:360px;
    background:#fff;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 18px 40px rgba(0,0,0,.08);
    transition:.3s;
}

.card:hover{
    transform:translateY(-8px);
    box-shadow:0 25px 45px rgba(0,0,0,.15);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.card-content{
    padding:30px;
}

.card h2{
    margin-bottom:15px;
    font-size:24px;
}

.card p{
    line-height:1.8;
    color:#666;
    margin-bottom:25px;
}

button{
    background:#0d6efd;
    color:#fff;
    border:none;
    padding:14px 28px;
    border-radius:8px;
    cursor:pointer;
    font-size:15px;
    transition:.3s;
}

button:hover{
    background:#0b5ed7;
}

.cta{
    width:1200px;
    margin:80px auto;
    background:#fff;
    border-radius:20px;
    padding:70px;
    text-align:center;
    box-shadow:0 18px 40px rgba(0,0,0,.08);
}

.cta h2{
    font-size:36px;
    margin-bottom:20px;
}

.cta p{
    color:#666;
    line-height:1.8;
    margin-bottom:35px;
}
</style>
</head>

<body>

<header>
    <h1>公司</h1>
    <p>
        以原生 HTML、CSS、JavaScript 建立品牌展示網站，
        採固定三欄桌機版設計，不針對手機裝置進行最佳化，
        作為後續 Bootstrap 響應式版本的對照範例。
    </p>
</header>

<div class="container">

    <div class="cards">

        <div class="card">
            <img src="https://picsum.photos/600/400?random=1" alt="">
            <div class="card-content">
                <h2>品牌服務</h2>
                <p>
                    提供專業品牌規劃、網站設計與數位整合服務，
                    建立一致且高品質的企業形象。
                </p>
                <button>了解更多</button>
            </div>
        </div>

        <div class="card">
            <img src="https://picsum.photos/600/400?random=2" alt="">
            <div class="card-content">
                <h2>數位解決方案</h2>
                <p>
                    結合設計思維與前端技術，
                    打造符合品牌需求的企業網站與數位體驗。
                </p>
                <button>立即查看</button>
            </div>
        </div>

        <div class="card">
            <img src="https://picsum.photos/600/400?random=3" alt="">
            <div class="card-content">
                <h2>專業團隊</h2>
                <p>
                    擁有豐富專案經驗，
                    提供從規劃、設計到開發的一站式服務。
                </p>
                <button>聯絡我們</button>
            </div>
        </div>

    </div>

</div>

<div class="cta">
    <h2>立即開始您的專案</h2>
    <p>
        歡迎與我們聯繫，打造符合品牌定位的企業網站與數位服務。
    </p>
    <button id="ctaButton">免費諮詢</button>
</div>

<script>
document.getElementById("ctaButton").addEventListener("click", function () {
    alert("感謝您的關注，歡迎與我們聯絡！");
});
</script>

</body>
</html>
