<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JSON 動態顧客資料表</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.datatables.net/2.0.8/css/dataTables.bootstrap5.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #f8f9fa;
    }

    .page-container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 48px 16px;
    }

    .table-card {
      background-color: #ffffff;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      overflow: hidden;
    }

    .table-card-header {
      padding: 20px 24px;
      background-color: #0d6efd;
      color: #ffffff;
    }

    .table-card-header h1 {
      margin: 0;
      font-size: 1.5rem;
      font-weight: 700;
    }

    .table-card-body {
      padding: 24px;
    }

    table.dataTable thead th {
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <main class="page-container">
    <section class="table-card">
      <header class="table-card-header">
        <h1>JSON 動態顧客資料表</h1>
      </header>

      <div class="table-card-body">
        <div class="table-responsive">
          <table id="data-table" class="table table-striped table-hover table-bordered align-middle w-100"></table>
        </div>
      </div>
    </section>
  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.datatables.net/2.0.8/js/dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/2.0.8/js/dataTables.bootstrap5.min.js"></script>

  <script>
    const customerData = [
      {
        id: "CUST-001",
        name: "林雅婷",
        email: "yating.lin@example.com",
        level: "一般會員",
        regDate: "2025-01-12"
      },
      {
        id: "CUST-002",
        name: "陳柏宇",
        email: "boyu.chen@example.com",
        level: "銀級會員",
        regDate: "2025-02-03"
      },
      {
        id: "CUST-003",
        name: "王思涵",
        email: "sihan.wang@example.com",
        level: "金級會員",
        regDate: "2025-02-18"
      },
      {
        id: "CUST-004",
        name: "張家豪",
        email: "jiahao.chang@example.com",
        level: "白金會員",
        regDate: "2025-03-07"
      },
      {
        id: "CUST-005",
        name: "劉佳穎",
        email: "jiaying.liu@example.com",
        level: "銀級會員",
        regDate: "2025-03-21"
      },
      {
        id: "CUST-006",
        name: "黃冠廷",
        email: "guanting.huang@example.com",
        level: "一般會員",
        regDate: "2025-04-09"
      },
      {
        id: "CUST-007",
        name: "吳品萱",
        email: "pinxuan.wu@example.com",
        level: "金級會員",
        regDate: "2025-04-26"
      },
      {
        id: "CUST-008",
        name: "許哲銘",
        email: "zheming.hsu@example.com",
        level: "白金會員",
        regDate: "2025-05-15"
      }
    ];

    const columns = [
      { key: "id", label: "顧客編號" },
      { key: "name", label: "姓名" },
      { key: "email", label: "電子郵件" },
      { key: "level", label: "會員等級" },
      { key: "regDate", label: "註冊日期" }
    ];

    const table = document.getElementById("data-table");

    const thead = document.createElement("thead");
    const headerRow = document.createElement("tr");

    columns.forEach(function (column) {
      const th = document.createElement("th");
      th.scope = "col";
      th.textContent = column.label;
      headerRow.appendChild(th);
    });

    thead.appendChild(headerRow);
    table.appendChild(thead);

    const tbody = document.createElement("tbody");

    customerData.forEach(function (customer) {
      const row = document.createElement("tr");

      columns.forEach(function (column) {
        const td = document.createElement("td");
        td.textContent = customer[column.key];
        row.appendChild(td);
      });

      tbody.appendChild(row);
    });

    table.appendChild(tbody);

    new DataTable("#data-table");
  </script>
</body>
</html>
